      - <<: *maritime_eez
        simplification: { epsilon_m: 2000 }
      - name: "cities_major"
        osm_match:
          geometry: ["Point"]
          tags:
            place: ["city"]
          requires_name: true
          population_min: 200000
        render:
          layer: "place_labels"
          themeKey: "text.places"
          placeType: "city"
          placePriority: 1
          fontSize: 18
          minLOD: 0


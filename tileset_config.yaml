# Tileset Configuration
# Defines all tilesets with their viewing ranges and feature inclusion rules
# Uses YAML anchors (&) and aliases (*) to deduplicate feature definitions

# =============================================================================
# GLOBAL SIMPLIFICATION SETTINGS
# =============================================================================
simplification_settings:
  preserve_topology: true
  snap_to_grid: false
  snap_grid_divisor: 2

# =============================================================================
# FEATURE TEMPLATES
# Reusable feature definitions referenced by tilesets via YAML anchors
# =============================================================================
feature_templates:
  # --- Water ---
  water_bodies_all: &water_bodies_all
    name: "water_bodies_all"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        natural: ["water"]
        waterway: ["riverbank"]
        landuse: ["basin", "reservoir", "salt_pond"]
    render:
      layer: "water_areas"
      themeKey: "water.area"
      fill: true
      minLOD: 0

  major_rivers: &major_rivers
    name: "major_rivers"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      tags:
        waterway: ["river", "canal"]
    render:
      layer: "waterways"
      themeKey: "water.line"
      minLOD: 0

  minor_waterways: &minor_waterways
    name: "minor_waterways"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      tags:
        waterway: ["stream", "ditch", "drain"]
    render:
      layer: "waterways"
      themeKey: "water.line"
      minLOD: 1

  ferry_routes: &ferry_routes
    name: "ferry_routes"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      tags:
        route: ["ferry"]
    render:
      layer: "ferry_routes"
      themeKey: "routes.ferry"
      minLOD: 0
      fill: false
      width: 2
      dashPatternKey: "ferry"

  # --- Natural areas ---
  scrub_heath: &scrub_heath
    name: "scrub_heath"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        natural: ["scrub", "heath"]
    render:
      layer: "natural_background"
      themeKey: "natural.scrub"
      fill: true
      minLOD: 1
      pattern: "scrub"

  wetland: &wetland
    name: "wetland"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        natural: ["wetland"]
    render:
      layer: "wetlands"
      themeKey: "natural.wetland"
      fill: true
      pattern: "wetland"
      patternOnly: true
      minLOD: 1

  cliff: &cliff
    name: "cliff"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      tags:
        natural: ["cliff"]
    render:
      layer: "natural_background"
      themeKey: "natural.cliff"
      width: 1.5
      minLOD: 1

  beach: &beach
    name: "beach"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        natural: ["beach"]
    render:
      layer: "natural_background"
      themeKey: "natural.beach"
      fill: true
      minLOD: 1
      pattern: "beach"

  sand: &sand
    name: "sand"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        natural: ["sand"]
    render:
      layer: "natural_background"
      themeKey: "natural.beach"
      fill: true
      minLOD: 1
      pattern: "beach"

  forests_all: &forests_all
    name: "forests_all"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        landuse: ["forest"]
        natural: ["wood"]
      preserve_tags: ["leaf_type"]
    render:
      layer: "forests"
      themeKey: "natural.forest"
      fill: true
      minLOD: 0

  # --- Roads ---
  motorways: &motorways
    name: "motorways"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      tags:
        highway: ["motorway", "trunk", "motorway_link", "trunk_link"]
        construction: ["motorway", "trunk", "motorway_link", "trunk_link"]
        planned: ["motorway", "trunk", "motorway_link", "trunk_link"]
        proposed: ["motorway", "trunk", "motorway_link", "trunk_link"]
      preserve_tags: ["bicycle_road", "cyclestreet", "planned", "proposed"]
    render:
      layer: "surface_roads"
      themeKey: "roads.motorway"
      minLOD: 0
      roadPriority: 7
      show_name: true
      name_priority: 1

  primary_roads: &primary_roads
    name: "primary_roads"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      tags:
        highway: ["primary", "primary_link"]
        construction: ["primary", "primary_link"]
        planned: ["primary", "primary_link"]
        proposed: ["primary", "primary_link"]
      preserve_tags: ["bicycle_road", "cyclestreet", "planned", "proposed"]
    render:
      layer: "surface_roads"
      themeKey: "roads.primary"
      minLOD: 0
      roadPriority: 6
      show_name: true
      name_priority: 2

  secondary_roads: &secondary_roads
    name: "secondary_roads"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      tags:
        highway: ["secondary", "secondary_link"]
        construction: ["secondary", "secondary_link"]
        planned: ["secondary", "secondary_link"]
        proposed: ["secondary", "secondary_link"]
      preserve_tags: ["bicycle_road", "cyclestreet", "planned", "proposed"]
    render:
      layer: "surface_roads"
      themeKey: "roads.secondary"
      minLOD: 1
      roadPriority: 5
      show_name: true
      name_priority: 3

  tertiary_roads: &tertiary_roads
    name: "tertiary_roads"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      tags:
        highway: ["tertiary", "tertiary_link"]
        construction: ["tertiary", "tertiary_link"]
        planned: ["tertiary", "tertiary_link"]
        proposed: ["tertiary", "tertiary_link"]
      preserve_tags: ["bicycle_road", "cyclestreet", "planned", "proposed"]
    render:
      layer: "surface_roads"
      themeKey: "roads.tertiary"
      minLOD: 1
      roadPriority: 4
      show_name: true
      name_priority: 4

  residential_roads: &residential_roads
    name: "residential_roads"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      tags:
        highway: ["residential", "unclassified", "living_street"]
        construction: ["residential", "living_street"]
        planned: ["residential", "living_street"]
        proposed: ["residential", "living_street"]
      preserve_tags: ["bicycle_road", "cyclestreet", "planned", "proposed"]
    render:
      layer: "surface_roads"
      themeKey: "roads.residential"
      minLOD: 2
      roadPriority: 3
      show_name: true
      name_priority: 5

  service_roads: &service_roads
    name: "service_roads"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      tags:
        highway: ["service", "busway"]
      preserve_tags: ["name"]
    render:
      layer: "surface_roads"
      themeKey: "roads.service"
      minLOD: 2
      roadPriority: 2
      show_name: true
      name_priority: 6

  tracks: &tracks
    name: "tracks"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      tags:
        highway: ["track"]
      preserve_tags: ["name", "tracktype"]
    render:
      layer: "surface_roads"
      themeKey: "roads.track"
      fixedWidthPx: 1.5
      dashPatternKey: "track"
      casingKey: "roads.casing"
      minLOD: 2
      roadPriority: 2
      show_name: true
      name_priority: 7

  minor_roads: &minor_roads
    name: "minor_roads"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      tags:
        highway: ["service", "track", "path", "footway", "cycleway", "bridleway",
                  "pedestrian", "steps", "living_street", "corridor", "busway", "raceway"]
        construction: ["service", "track", "path", "footway", "cycleway", "bridleway",
                       "pedestrian", "steps", "living_street", "corridor", "busway", "raceway"]
        planned: ["service", "track", "path", "footway", "cycleway", "bridleway",
                  "pedestrian", "steps", "living_street", "corridor", "busway", "raceway"]
        proposed: ["service", "track", "path", "footway", "cycleway", "bridleway",
                   "pedestrian", "steps", "living_street", "corridor", "busway", "raceway"]
      preserve_tags: ["bicycle_road", "cyclestreet", "planned", "proposed"]
    render:
      layer: "surface_roads"
      minLOD: 2
      show_name: true
      name_priority: 6

  # --- Railways ---
  major_rail: &major_rail
    name: "major_rail"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      tags:
        railway: ["rail", "narrow_gauge", "preserved", "construction", "planned", "proposed"]
    render:
      layer: "surface_railways"
      themeKey: "railways.rail"
      isRailway: true
      width: 8
      minLOD: 0
      preserve_tags: ["construction", "planned", "proposed", "railway"]

  subway_light_rail: &subway_light_rail
    name: "subway_light_rail"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      tags:
        railway: ["subway", "light_rail"]
    render:
      layer: "surface_railways"
      themeKey: "railways.rail"
      isRailway: true
      width: 6
      minLOD: 1

  tram: &tram
    name: "tram"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      tags:
        railway: ["tram", "funicular", "miniature"]
    render:
      layer: "surface_railways"
      themeKey: "railways.rail"
      isRailway: true
      width: 6
      minLOD: 2

  railway_platforms: &railway_platforms
    name: "railway_platforms"
    osm_match:
      geometry: ["Polygon", "MultiPolygon", "LineString", "MultiLineString"]
      tags:
        railway: ["platform"]
        public_transport: ["platform"]
    render:
      layer: "surface_railways"
      themeKey: "platforms.fill"
      fill: true
      isPlatform: true
      minLOD: 2
      preserve_tags: ["name", "ref", "railway", "public_transport"]

  railway_stations: &railway_stations
    name: "railway_stations"
    osm_match:
      geometry: ["Point", "Polygon", "MultiPolygon"]
      tags:
        railway: ["station", "halt"]
        public_transport: ["station"]
    render:
      layer: "surface_railways"
      themeKey: "railways.rail"
      minLOD: 1
      preserve_tags: ["name", "station", "network", "operator", "railway", "public_transport"]

  # --- Landuse ---
  parks: &parks
    name: "parks"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        leisure: ["park", "garden", "recreation_ground", "dog_park", "playground"]
        landuse: ["grass", "meadow", "village_green", "recreation_ground"]
    render:
      layer: "natural_background"
      themeKey: "natural.park"
      fill: true
      minLOD: 1

  camping_areas: &camping_areas
    name: "camping_areas"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        leisure: ["camp_site"]
        tourism: ["camp_site", "caravan_site"]
    render:
      layer: "natural_background"
      themeKey: "specialPurpose.camping"
      fill: true
      minLOD: 1

  agriculture: &agriculture
    name: "agriculture"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        landuse: ["farmland", "farmyard", "orchard", "vineyard",
                  "plant_nursery", "greenhouse_horticulture"]
    render:
      layer: "natural_background"
      themeKey: "agriculture.farmland"
      fill: true
      minLOD: 1

  residential_landuse: &residential_landuse
    name: "residential_landuse"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        landuse: ["residential"]
    render:
      layer: "landuse_areas"
      themeKey: "landuse.residential"
      prominentThemeKey: "landuse.residentialProminent"
      fill: true
      minLOD: 1

  commercial_landuse: &commercial_landuse
    name: "commercial_landuse"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        landuse: ["commercial", "retail"]
    render:
      layer: "landuse_areas"
      themeKey: "landuse.commercial"
      prominentThemeKey: "landuse.commercialProminent"
      fill: true
      minLOD: 1

  industrial_landuse: &industrial_landuse
    name: "industrial_landuse"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        landuse: ["industrial"]
    render:
      layer: "landuse_areas"
      themeKey: "landuse.industrial"
      prominentThemeKey: "landuse.industrialProminent"
      fill: true
      minLOD: 1

  cemeteries: &cemeteries
    name: "cemeteries"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        landuse: ["cemetery"]
        amenity: ["grave_yard"]
    render:
      layer: "landuse_areas"
      themeKey: "specialPurpose.cemetery"
      fill: true
      minLOD: 1

  military: &military
    name: "military"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        landuse: ["military"]
        military: ["*"]
    render:
      layer: "landuse_areas"
      themeKey: "landuse.military"
      fill: true
      minLOD: 1
      pattern: "military_hatch"
      patternOnly: true

  railway_yards: &railway_yards
    name: "railway_yards"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        landuse: ["railway"]
    render:
      layer: "landuse_areas"
      themeKey: "specialPurpose.railway"
      fill: true
      minLOD: 1

  allotments: &allotments
    name: "allotments"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        landuse: ["allotments"]
    render:
      layer: "landuse_areas"
      themeKey: "agriculture.allotments"
      fill: true
      minLOD: 1

  construction: &construction
    name: "construction"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        landuse: ["construction", "brownfield", "greenfield"]
    render:
      layer: "landuse_areas"
      themeKey: "landuse.construction"
      fill: true
      minLOD: 2

  education: &education
    name: "education"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        landuse: ["education"]
        amenity: ["school", "university", "college", "kindergarten"]
    render:
      layer: "landuse_areas"
      themeKey: "specialPurpose.education"
      fill: true
      minLOD: 2

  religious: &religious
    name: "religious"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        landuse: ["religious"]
        amenity: ["place_of_worship"]
    render:
      layer: "landuse_areas"
      themeKey: "specialPurpose.religious"
      fill: true
      minLOD: 2

  quarries: &quarries
    name: "quarries"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        landuse: ["quarry", "landfill"]
    render:
      layer: "landuse_areas"
      themeKey: "specialPurpose.quarry"
      fill: true
      minLOD: 2

  port: &port
    name: "port"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        landuse: ["port"]
    render:
      layer: "landuse_areas"
      themeKey: "landuse.port"
      fill: true
      minLOD: 1

  institutional: &institutional
    name: "institutional"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        landuse: ["institutional"]
    render:
      layer: "landuse_areas"
      themeKey: "landuse.institutional"
      prominentThemeKey: "landuse.institutionalProminent"
      fill: true
      minLOD: 1

  flowerbed: &flowerbed
    name: "flowerbed"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        landuse: ["flowerbed"]
    render:
      layer: "natural_background"
      themeKey: "agriculture.flowerbed"
      fill: true
      minLOD: 2

  highway_service_areas: &highway_service_areas
    name: "highway_service_areas"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        highway: ["services", "rest_area"]
    render:
      layer: "landuse_areas"
      themeKey: "specialPurpose.services"
      fill: true
      minLOD: 1

  # --- Recreation ---
  playground: &playground
    name: "playground"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        leisure: ["playground"]
    render:
      layer: "landuse_areas"
      themeKey: "recreation.playground"
      fill: true
      minLOD: 1
      pattern: "playground"

  swimming_pool: &swimming_pool
    name: "swimming_pool"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        leisure: ["swimming_pool"]
        amenity: ["swimming_pool"]
    render:
      layer: "landuse_areas"
      themeKey: "water.area"
      fill: true
      minLOD: 2
      areaPoiCategory: "swimming"

  picnic_site: &picnic_site
    name: "picnic_site"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        leisure: ["picnic_table"]
        tourism: ["picnic_site"]
    render:
      layer: "landuse_areas"
      themeKey: "recreation.picnicSite"
      fill: true
      minLOD: 2
      pattern: "picnic_site"

  table_tennis: &table_tennis
    name: "table_tennis"
    osm_match:
      geometry: ["Point"]
      match_all: true
      tags:
        leisure: ["pitch"]
        sport: ["table_tennis"]
      preserve_tags: ["sport"]
    render:
      layer: "points"
      poiCategory: "recreation"
      minLOD: 3

  beach_volleyball: &beach_volleyball
    name: "beach_volleyball"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      match_all: true
      tags:
        leisure: ["pitch"]
        sport: ["beachvolleyball"]
    render:
      layer: "landuse_areas"
      themeKey: "recreation.beachVolleyball"
      fill: true
      minLOD: 2
      pattern: "beach_volleyball"

  # General sports pitches (tennis, soccer, hockey, basketball, etc.)
  sports_pitch: &sports_pitch
    name: "sports_pitch"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        leisure: ["pitch"]
      preserve_tags: ["sport"]
    render:
      layer: "landuse_areas"
      themeKey: "recreation.pitch"
      fill: true
      minLOD: 1

  # Sports centres, sports halls, tracks (horse racing, athletics)
  sports_facility: &sports_facility
    name: "sports_facility"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        leisure: ["sports_centre", "sports_hall", "track", "stadium"]
      preserve_tags: ["sport"]
    render:
      layer: "landuse_areas"
      themeKey: "recreation.sportsFacility"
      fill: true
      minLOD: 1

  # Miniature golf
  miniature_golf: &miniature_golf
    name: "miniature_golf"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        leisure: ["miniature_golf"]
    render:
      layer: "landuse_areas"
      themeKey: "recreation.miniatureGolf"
      fill: true
      minLOD: 1

  # --- Aeroways ---
  runways: &runways
    name: "runways"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      tags:
        aeroway: ["runway"]
    render:
      layer: "aeroways"
      themeKey: "aeroway.runway"
      isRunway: true
      minLOD: 0
      preserve_tags: ["ref", "surface", "width", "lit", "length"]

  taxiways: &taxiways
    name: "taxiways"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      tags:
        aeroway: ["taxiway"]
    render:
      layer: "aeroways"
      themeKey: "aeroway.taxiway"
      minLOD: 2
      preserve_tags: ["ref", "surface"]

  aprons: &aprons
    name: "aprons"
    osm_match:
      geometry: ["Polygon", "MultiPolygon", "LineString", "MultiLineString"]
      tags:
        aeroway: ["apron"]
    render:
      layer: "aeroways"
      themeKey: "aeroway.apron"
      fill: true
      minLOD: 2

  helipads: &helipads
    name: "helipads"
    osm_match:
      geometry: ["Polygon", "MultiPolygon", "Point"]
      tags:
        aeroway: ["helipad"]
    render:
      layer: "aeroways"
      themeKey: "aeroway.helipad"
      fill: true
      isHelipad: true
      minLOD: 3
      preserve_tags: ["ref"]

  # --- Buildings ---
  buildings: &buildings
    name: "buildings"
    osm_match:
      geometry: ["Polygon", "MultiPolygon"]
      tags:
        building: ["*"]
      tags_exclude:
        building: ["no"]
    render:
      layer: "buildings"
      themeKey: "buildings.default"
      strokeThemeKey: "buildings.border"
      strokeWidth: 0.5
      fill: true
      minLOD: 2

  # --- Boundaries ---
  country_borders: &country_borders
    name: "country_borders"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      match_all: true
      tags:
        boundary: ["administrative"]
        admin_level: ["2"]
      tags_exclude:
        maritime: ["yes"]
    render:
      layer: "boundaries"
      themeKey: "boundaries.country"
      dashPatternKey: "countryBorder"
      width: 2.5
      minLOD: 0

  state_borders: &state_borders
    name: "state_borders"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      match_all: true
      tags:
        boundary: ["administrative"]
        admin_level: ["4"]
      tags_exclude:
        maritime: ["yes"]
    render:
      layer: "boundaries"
      themeKey: "boundaries.state"
      dashPatternKey: "stateBorder"
      width: 1.5
      minLOD: 0

  district_borders: &district_borders
    name: "district_borders"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      match_all: true
      tags:
        boundary: ["administrative"]
        admin_level: ["6"]
      tags_exclude:
        maritime: ["yes"]
    render:
      layer: "boundaries"
      themeKey: "boundaries.district"
      dashPatternKey: "districtBorder"
      width: 1.0
      minLOD: 1

  # Territorial waters (boundary=administrative + maritime=yes)
  maritime_territorial: &maritime_territorial
    name: "maritime_territorial"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      match_all: true
      tags:
        boundary: ["administrative"]
        maritime: ["yes"]
    render:
      layer: "boundaries"
      themeKey: "boundaries.maritime"
      dashPatternKey: "maritime"
      width: 1.5
      minLOD: 0

  # Exclusive economic zones (boundary=maritime)
  maritime_eez: &maritime_eez
    name: "maritime_eez"
    osm_match:
      geometry: ["LineString", "MultiLineString"]
      tags:
        boundary: ["maritime"]
    render:
      layer: "boundaries"
      themeKey: "boundaries.eez"
      dashPatternKey: "eez"
      width: 1.0
      minLOD: 0

  # --- Labels ---
  cities: &cities
    name: "cities"
    osm_match:
      geometry: ["Point"]
      tags:
        place: ["city"]
      requires_name: true
    render:
      layer: "place_labels"
      themeKey: "text.places"
      placeType: "city"
      placePriority: 1
